<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Content</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="{{ url_for('api.home') }}">

🎓 CMS+ Portal

</a>

<div class="ms-auto">

<a href="{{ url_for('api.student_dashboard') }}"
class="btn btn-outline-light">

Dashboard

</a>

</div>

</div>

</nav>

<!-- CONTENT -->

<div class="content-box">

<h2 class="course-title">

{{ course.course_name }}

</h2>

<p>

<b>Instructor :</b>

{{ course.instructor }}

</p>

<p>

<b>Duration :</b>

{{ course.duration }}

</p>

<hr>

<h5>Your Progress</h5>

<div class="progress mb-4">

<div
class="progress-bar bg-info progress-bar-striped progress-bar-animated"
style="width:{{ progress }}%">

{{ progress }}%

</div>

</div>

<div class="row">

{% for module in modules %}

<div class="col-lg-4 mb-4">

<div class="card module-card">

<div class="card-body text-center">

<i class="bi bi-journal-bookmark-fill module-icon"></i>

<h4 class="mt-3">

{{ module.title }}

</h4>

<p>

{{ module.description }}

</p>

<hr>

<button
type="button"
class="btn btn-open w-100 disabled"
disabled>

Open Module

</button>

</div>

</div>

</div>

{% endfor %}

</div>

<div class="text-center mt-4">

<a
href="{{ url_for('api.my_courses') }}"
class="btn btn-outline-light">

<i class="bi bi-arrow-left"></i>

Back to My Courses

</a>

</div>

</div>

<footer>

© 2026 Course Management System+

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
