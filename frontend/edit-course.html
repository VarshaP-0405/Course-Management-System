<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">

    <style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card">

<div class="card-header text-center">
<h3>Edit Course</h3>
</div>

<div class="card-body">

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}
<div class="alert alert-{{category}}">
{{message}}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">
<label>Course Name</label>

<input
type="text"
class="form-control"
name="course_name"
value="{{ course.course_name }}"
required>

</div>

<div class="mb-3">

<label>Course Code</label>

<input
type="text"
class="form-control"
name="course_code"
value="{{ course.course_code }}"
required>

</div>

<div class="mb-3">

<label>Instructor</label>

<input
type="text"
class="form-control"
name="instructor"
value="{{ course.instructor }}"
required>

</div>

<div class="mb-3">

<label>Duration</label>

<input
type="text"
class="form-control"
name="duration"
value="{{ course.duration }}"
required>

</div>

<div class="mb-3">

<label>Credits</label>

<input
type="number"
class="form-control"
name="credits"
value="{{ course.credits }}"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
class="form-control"
rows="5"
name="description">{{ course.description }}</textarea>

</div>

<button class="btn btn-primary w-100">
Update Course
</button>

</form>

</div>

<div class="card-footer text-center">

<a href="{{ url_for('api.admin_dashboard') }}"
class="btn btn-secondary">
Back
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
