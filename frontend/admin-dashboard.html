<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | CMS+</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}

/* Navbar */
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}

/* Glass card */
.glass{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    padding:20px;
    transition:0.3s;
}

.glass:hover{
    transform:translateY(-5px);
}

.section-title{
    text-align:center;
    margin:40px 0;
}

.stat{
    font-size:2rem;
    font-weight:bold;
    color:#6ee7ff;
}

.btn-custom{
    background:#0dcaf0;
    color:black;
    font-weight:600;
}

.btn-custom:hover{
    background:#31d2f2;
}

footer{
    background:#07111f;
    padding:20px;
    text-align:center;
    margin-top:50px;
}

</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">🛡️ Admin Panel</a>

<div class="ms-auto">
<a href="{{ url_for('api.home') }}" class="btn btn-outline-light btn-sm">Home</a>
<a href="{{ url_for('api.logout') }}" class="btn btn-light btn-sm">Logout</a>
</div>
</div>
</nav>

<!-- DASHBOARD TITLE -->
<div class="container">
<h1 class="section-title">Admin Dashboard</h1>

<!-- STATS -->
<div class="row g-4 text-center">

    <div class="col-md-4">
        <div class="glass">
            <h2 class="stat">500+</h2>
            <p>Total Students</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass">
            <h2 class="stat">50+</h2>
            <p>Total Courses</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass">
            <h2 class="stat">1200+</h2>
            <p>Enrollments</p>
        </div>
    </div>

</div>

<!-- QUICK ACTIONS -->
<div class="row mt-5 g-4">

    <div class="col-md-4">
        <div class="glass text-center">
            <h4>📚 Add Course</h4>
            <p>Create and manage new courses</p>
            <a href="#" class="btn btn-custom w-100">Go</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass text-center">
            <h4>👨‍🎓 View Students</h4>
            <p>Manage all registered students</p>
            <a href="#" class="btn btn-custom w-100">Go</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass text-center">
            <h4>📊 Reports</h4>
            <p>View analytics and progress reports</p>
            <a href="#" class="btn btn-custom w-100">Go</a>
        </div>
    </div>

</div>

</div>

<footer>
<p>© 2026 Course Management System+</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
