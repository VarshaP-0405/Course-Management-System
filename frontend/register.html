<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration | Course Management System+</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="glass p-5">

<div class="text-center mb-4">

<h2 class="fw-bold">
🎓 Student Registration
</h2>

<p>
Create your Course Management System account
</p>

</div>

<form method="POST" action="{{ url_for('api.register') }}">

<div class="row">

<div class="col-md-6 mb-3">

<label>First Name</label>

<input
type="text"
class="form-control"
name="first_name"
required>

</div>

<div class="col-md-6 mb-3">

<label>Last Name</label>

<input
type="text"
class="form-control"
name="last_name"
required>

</div>

<div class="col-md-6 mb-3">

<label>Email Address</label>

<input
type="email"
class="form-control"
name="email"
required>

</div>

<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input
type="text"
class="form-control"
name="phone"
required>

</div>

<div class="col-md-4 mb-3">

<label>Age</label>

<input
type="number"
class="form-control"
name="age">

</div>

<div class="col-md-4 mb-3">

<label>Gender</label>

<select
class="form-select"
name="gender">

<option value="">Select</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label>Date of Birth</label>

<input
type="date"
class="form-control"
name="dob">

</div>

<div class="col-12 mb-3">

<label>Address</label>

<textarea
class="form-control"
rows="2"
name="address"></textarea>

</div>

<div class="col-md-6 mb-3">

<label>Department</label>

<select
class="form-select"
name="department"
required>

<option value="">Choose Department</option>

<option>Computer Science</option>

<option>Artificial Intelligence</option>

<option>Information Technology</option>

<option>Data Science</option>

<option>Cyber Security</option>

<option>Electronics</option>

<option>Mechanical</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Role</label>

<select
class="form-select"
name="role">

<option value="3">Student</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
name="password"
required>

</div>

<div class="col-md-6 mb-4">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
name="confirm_password"
required>

</div>

<div class="d-grid">

<button
class="btn btn-register btn-lg">

Register Account

</button>

</div>

</form>

<hr class="text-light">

<p class="text-center mb-0">

Already have an account?

<a href="{{ url_for('api.login') }}">

Sign In

</a>

</p>

</div>

</div>

</div>

</div>

</body>
</html>
