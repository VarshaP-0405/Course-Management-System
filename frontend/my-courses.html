<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">
My Enrolled Courses
</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Course Name</th>

<th>Course Code</th>

<th>Instructor</th>

<th>Duration</th>

<th>Credits</th>

</tr>

</thead>

<tbody>

{% for course in courses %}

<tr>

<td>{{ course.id }}</td>

<td>{{ course.course_name }}</td>

<td>{{ course.course_code }}</td>

<td>{{ course.instructor }}</td>

<td>{{ course.duration }}</td>

<td>{{ course.credits }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center">

<a href="{{ url_for('api.student_dashboard') }}"
class="btn btn-secondary">
Back to Dashboard
</a>

</div>

</div>

</body>
</html>
