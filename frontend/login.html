<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMS+ Login Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{

    margin:0;
    min-height:100vh;

    font-family:Segoe UI,Arial,sans-serif;

    background:linear-gradient(135deg,#0b1f3a,#174b7a);

    color:white;

    display:flex;
    flex-direction:column;

}



/* Navbar */

.navbar{

    background:rgba(0,0,0,.2);

    backdrop-filter:blur(10px);

}



/* Login Box */

.login-box{

    width:400px;

    margin:auto;

    margin-top:70px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:15px;

    padding:35px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

}



/* Heading */

h2{

    text-align:center;

    color:#6ee7ff;

    font-weight:bold;

    margin-bottom:10px;

}


.subtitle{

    text-align:center;

    color:#ddd;

    margin-bottom:25px;

}



/* Inputs */

.form-control{

    background:rgba(255,255,255,.15);

    border:none;

    color:white;

    padding:12px;

}



.form-control::placeholder{

    color:#ddd;

}



.form-control:focus{

    background:rgba(255,255,255,.2);

    color:white;

    box-shadow:0 0 10px #0dcaf0;

}



/* Dropdown */

select.form-control option{

    color:black;

}



/* Button */

.btn-login{

    background:#0dcaf0;

    color:black;

    font-weight:600;

    padding:12px;

    border-radius:8px;

}



.btn-login:hover{

    background:#31d2f2;

}



/* Links */

.links{

    text-align:center;

    margin-top:20px;

}


a{

    color:#6ee7ff;

    text-decoration:none;

}


a:hover{

    text-decoration:underline;

}



/* Footer */

footer{

    background:#07111f;

    padding:20px;

    text-align:center;

    margin-top:auto;

}



</style>


</head>



<body>



<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">


<a class="navbar-brand fw-bold" href="#">

🎓 CMS+ Portal

</a>



<div class="ms-auto">

<a href="{{ url_for('api.home') }}" 
class="btn btn-outline-light btn-sm">

Home

</a>

</div>


</div>

</nav>




<!-- LOGIN -->

<div class="login-box">


<h2>Welcome Back</h2>

<p class="subtitle">
Login as Admin, Faculty or Student
</p>



<form action="{{ url_for('api.login') }}" method="POST">



<!-- ROLE -->

<div class="mb-3">


<select 
name="role"
class="form-control"
required>


<option value="" disabled selected>
Select Role
</option>


<option value="1">
Admin
</option>


<option value="2">
Faculty
</option>


<option value="3">
Student
</option>


</select>


</div>




<!-- EMAIL -->


<div class="mb-3">


<input

type="email"

name="email"

class="form-control"

placeholder="Email Address"

required>


</div>




<!-- PASSWORD -->


<div class="mb-3">


<input

type="password"

name="password"

class="form-control"

placeholder="Password"

required>


</div>




<!-- LOGIN BUTTON -->


<button 

type="submit"

class="btn btn-login w-100">


Login


</button>



</form>




<div class="links">


<p>

<a href="#">

Forgot Password?

</a>

</p>



<p>

New User?

<a href="{{ url_for('api.register') }}">

Create Account

</a>


</p>



</div>



</div>






<footer>


<p>
© 2026 Course Management System+
</p>


</footer>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
