<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#2c3e50;
}

p{
    text-align:center;
    color:#666;
}

input{
    width:100%;
    padding:10px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

a{
    text-decoration:none;
    color:#007BFF;
}

.links{
    text-align:center;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

<h2>Forgot Password</h2>

<p>Enter your registered email address.</p>

<form action="reset-password.html">

<input type="email" placeholder="Enter Email Address" required>

<button type="submit">Send Reset Link</button>

</form>

<div class="links">
<a href="login.html">Back to Login</a>
</div>

</div>

</body>
</html>
