<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:350px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#2c3e50;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1e7e34;
}

.links{
    text-align:center;
    margin-top:15px;
}

a{
    color:#007BFF;
    text-decoration:none;
}

</style>

</head>
<body>

<div class="container">

<h2>Student Login</h2>

<form action="dashboard.html">

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">

<p><a href="#">Forgot Password?</a></p>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</div>

</body>
</html>
