<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>

</head>
<body>

<div class="container">

<h2>Forgot Password</h2>

<p>Enter your registered email address.</p>

<form action="{{ url_for('api.forgot_password') }}" method="POST">

<input type="email" name="email" placeholder="Enter Email Address" required>

<button type="submit">Send Reset Link</button>

</form>

<div class="links">
<a href="{{ url_for('api.login') }}">Back to Login</a>
</div>

</div>

</body>
</html>
