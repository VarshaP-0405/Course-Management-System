<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMS+ Login Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">


<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>


</head>



<body>



<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">


<a class="navbar-brand fw-bold" href="{{ url_for('api.home') }}">

🎓 CMS+ Portal

</a>



<div class="ms-auto">

<a href="{{ url_for('api.home') }}" 
class="btn btn-outline-light btn-sm">

Home

</a>

</div>


</div>

</nav>




<!-- LOGIN -->

<div class="login-box">


<h2>Welcome Back</h2>

<p class="subtitle">
Login as Admin, Faculty or Student
</p>



<form action="{{ url_for('api.login') }}" method="POST">



<!-- ROLE -->

<div class="mb-3">


<select 
name="role"
class="form-control"
required>


<option value="" disabled selected>
Select Role
</option>


<option value="1">
Admin
</option>


<option value="2">
Faculty
</option>


<option value="3">
Student
</option>


</select>


</div>




<!-- EMAIL -->


<div class="mb-3">


<input

type="email"

name="email"

class="form-control"

placeholder="Email Address"

required>


</div>




<!-- PASSWORD -->


<div class="mb-3">


<input

type="password"

name="password"

class="form-control"

placeholder="Password"

required>


</div>




<!-- LOGIN BUTTON -->


<button 

type="submit"

class="btn btn-login w-100">


Login


</button>



</form>




<div class="links">


<p>

<a href="{{ url_for('api.forgot_password') }}">

Forgot Password?

</a>

</p>



<p>

New User?

<a href="{{ url_for('api.register') }}">

Create Account

</a>


</p>



</div>



</div>






<footer>


<p>
© 2026 Course Management System+
</p>


</footer>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
