<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | CMS+</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0b1f3a,#174b7a);
    color:white;
}
.navbar{
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(10px);
}
.glass,
.card,
.content-box,
.container-card,
.card-body,
.card-header,
.container,
.login-box {
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.card-header {
    background:rgba(255,255,255,.12);
}
.btn-primary,
.btn-success,
.btn-secondary,
.btn-custom,
.btn-login,
.btn-register,
.btn-info,
.btn-outline-light {
    background:#0dcaf0;
    color:black;
    border:none;
    font-weight:600;
}
.btn-primary:hover,
.btn-success:hover,
.btn-secondary:hover,
.btn-custom:hover,
.btn-login:hover,
.btn-register:hover,
.btn-info:hover {
    background:#31d2f2;
}
.btn-outline-light {
    background:transparent;
    color:white;
    border:1px solid rgba(255,255,255,.6);
}
.btn-outline-light:hover {
    background:rgba(255,255,255,.12);
}
input,
textarea,
select,
.form-control,
.form-select {
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
}
input::placeholder,
textarea::placeholder,
.form-control::placeholder {
    color:#ddd;
}
input:focus,
textarea:focus,
select:focus,
.form-control:focus,
.form-select:focus {
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px #0dcaf0;
    outline:none;
}
footer {
    background:#07111f;
    text-align:center;
    padding:18px;
    margin-top:auto;
}
.section-title {
    text-align:center;
    margin:40px 0;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="{{ url_for('api.admin_dashboard') }}">🛡️ Admin Panel</a>

<div class="ms-auto">
<a href="{{ url_for('api.home') }}" class="btn btn-outline-light btn-sm">Home</a>
<a href="{{ url_for('api.logout') }}" class="btn btn-light btn-sm">Logout</a>
</div>
</div>
</nav>

<!-- DASHBOARD TITLE -->
<div class="container">
<h1 class="section-title">Admin Dashboard</h1>

<!-- STATS -->
<div class="row g-4 text-center">

    <div class="col-md-4">
        <div class="glass">
            <h2 class="stat">500+</h2>
            <p>Total Students</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass">
            <h2 class="stat">50+</h2>
            <p>Total Courses</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass">
            <h2 class="stat">1200+</h2>
            <p>Enrollments</p>
        </div>
    </div>

</div>

<!-- QUICK ACTIONS -->
<div class="row mt-5 g-4">

    <div class="col-md-4">
        <div class="glass text-center">
            <h4>📚 Add Course</h4>
            <p>Create and manage new courses</p>
            <a href="{{ url_for('api.add_course') }}" class="btn btn-custom w-100">Go</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass text-center">
            <h4>👨‍🎓 View Students</h4>
            <p>Manage all registered students</p>
            <a href="{{ url_for('api.home') }}" class="btn btn-custom w-100">Go</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass text-center">
            <h4>📊 Reports</h4>
            <p>View analytics and progress reports</p>
            <a href="{{ url_for('api.home') }}" class="btn btn-custom w-100">Go</a>
        </div>
    </div>

</div>

</div>

<footer>
<p>© 2026 Course Management System+</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
