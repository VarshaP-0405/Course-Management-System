<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#2c3e50;
}

input{
    width:100%;
    padding:10px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.links{
    text-align:center;
    margin-top:15px;
}

a{
    color:#007BFF;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h2>Reset Password</h2>

<form action="login.html">

<input type="password" placeholder="New Password" required>

<input type="password" placeholder="Confirm New Password" required>

<button type="submit">Reset Password</button>

</form>

<div class="links">
<a href="login.html">Back to Login</a>
</div>

</div>

</body>
</html>
